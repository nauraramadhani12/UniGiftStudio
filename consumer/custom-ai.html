<!DOCTYPE html>
<html>
<head>

<title>Custom AI</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-amber-50">

<div class="max-w-xl mx-auto py-20">

<h1 class="text-3xl font-bold text-center mb-6">
AI Souvenir Generator
</h1>

<div class="bg-white p-8 rounded shadow">

<label>Upload Photo</label>

<input type="file"
class="border w-full p-2 mb-4">

<label>Description</label>

<textarea
class="border w-full p-2 mb-4"
placeholder="Describe your souvenir"></textarea>

<button
class="bg-orange-500 text-white w-full py-3 rounded">

Generate Design

</button>

</div>

</div>

</body>
</html>
