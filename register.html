<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar | Uni Gift Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen relative overflow-x-hidden selection:bg-orange-200 selection:text-orange-900">

    <div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0">
        <div class="absolute -top-20 -left-20 w-96 h-96 bg-orange-300 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-pulse"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-96 h-96 bg-yellow-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40"></div>
    </div>

    <a href="index.html" class="fixed top-6 left-6 md:top-8 md:left-8 z-30 flex items-center gap-2 px-5 py-2.5 bg-white/60 hover:bg-white backdrop-blur-md border border-white/60 text-slate-600 hover:text-orange-600 font-bold rounded-full transition-all shadow-sm hover:shadow-md group">
        <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Kembali ke Beranda
    </a>

    <div class="flex flex-col min-h-screen w-full py-24 px-6 md:py-12">
        
        <div class="w-full max-w-lg m-auto relative z-10">
            <div class="bg-white/80 backdrop-blur-xl p-8 sm:p-10 rounded-[2.5rem] shadow-2xl border border-white">
                
                <div class="text-center mb-8 mt-2">
                    <div class="relative inline-flex justify-center items-center mb-5">
                        <div class="absolute inset-0 bg-orange-400 blur-lg opacity-40 rounded-full"></div>
                        <div class="relative inline-flex items-center justify-center w-14 h-14 bg-gradient-to-br from-orange-400 to-orange-600 rounded-2xl text-white font-black text-3xl shadow-xl border-2 border-white ring-4 ring-orange-50/50">
                            U
                        </div>
                    </div>
                    <h2 class="text-3xl font-extrabold text-slate-900 mb-2 tracking-tight">
                        Buat Akun Baru ✨
                    </h2>
                    <p class="text-slate-500 text-sm md:text-base font-medium">
                        Bergabung dengan komunitas <span class="text-orange-500 font-bold">Uni Gift Studio</span>.
                    </p>
                </div>

                <form action="#" method="POST" class="space-y-4">
                    
                    <div class="mb-2">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Daftar Sebagai</label>
                        <div class="grid grid-cols-2 gap-4">
                            <label class="cursor-pointer relative">
                                <input type="radio" name="role" value="consumer" class="peer sr-only" checked>
                                <div class="text-center px-4 py-3 rounded-xl border-2 border-slate-200 peer-checked:border-orange-500 peer-checked:bg-orange-50 peer-checked:text-orange-600 font-bold text-slate-500 transition hover:bg-slate-50">
                                    🛍️ Konsumen
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="role" value="creator" class="peer sr-only">
                                <div class="text-center px-4 py-3 rounded-xl border-2 border-slate-200 peer-checked:border-slate-900 peer-checked:bg-slate-900 peer-checked:text-white font-bold text-slate-500 transition hover:bg-slate-50">
                                    🎨 Kreator 3D
                                </div>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label for="name" class="block text-sm font-bold text-slate-700 mb-1.5">Nama Lengkap</label>
                        <input type="text" id="name" placeholder="John Doe" required
                            class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition font-medium text-slate-800 placeholder-slate-400">
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-bold text-slate-700 mb-1.5">Email</label>
                        <input type="email" id="email" placeholder="nama@email.com" required
                            class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition font-medium text-slate-800 placeholder-slate-400">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="password" class="block text-sm font-bold text-slate-700 mb-1.5">Password</label>
                            <input type="password" id="password" placeholder="••••••••" required
                                class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition font-medium text-slate-800 placeholder-slate-400">
                        </div>
                        <div>
                            <label for="confirm_password" class="block text-sm font-bold text-slate-700 mb-1.5">Ulangi Password</label>
                            <input type="password" id="confirm_password" placeholder="••••••••" required
                                class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition font-medium text-slate-800 placeholder-slate-400">
                        </div>
                    </div>

                    <div class="flex items-start mt-4 pt-2">
                        <div class="flex items-center h-5">
                            <input type="checkbox" id="terms" required class="w-4 h-4 rounded border-slate-300 text-orange-500 focus:ring-orange-500 cursor-pointer mt-1">
                        </div>
                        <label for="terms" class="ml-2 text-sm text-slate-600 font-medium cursor-pointer leading-relaxed">
                            Saya setuju dengan <a href="#" class="text-orange-500 hover:text-orange-600 font-bold transition">Syarat & Ketentuan</a> serta <a href="#" class="text-orange-500 hover:text-orange-600 font-bold transition">Kebijakan Privasi</a>.
                        </label>
                    </div>

                    <button type="submit" class="w-full bg-slate-900 hover:bg-orange-500 text-white font-bold py-4 rounded-xl transition duration-300 shadow-lg shadow-slate-200 hover:shadow-orange-200 mt-4">
                        Daftar Sekarang
                    </button>

                </form>

                <div class="mt-6 flex items-center justify-center space-x-4">
                    <span class="h-px w-full bg-slate-200"></span>
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Atau</span>
                    <span class="h-px w-full bg-slate-200"></span>
                </div>

                <div class="mt-6">
                    <button class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-bold py-3.5 rounded-xl transition shadow-sm">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Daftar dengan Google
                    </button>
                </div>

                <p class="text-center mt-8 text-sm text-slate-500 font-medium">
                    Sudah punya akun? 
                    <a href="login.html" class="text-orange-500 hover:text-orange-600 font-bold transition">Masuk di sini</a>
                </p>

            </div>
        </div>
    </div>

</body>
</html>
